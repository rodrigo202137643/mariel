<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Para Mariel - Blue</title>
  <style>
    * { box-sizing: border-box; }
    body, html { 
      margin: 0; 
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden; 
      background-color: #030303; 
      font-family: 'Cinzel', 'Times New Roman', serif;
    }
    
    svg { display: none; }
    canvas { display: block; position: fixed; top: 0; left: 0; z-index: 1; }

    #overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background-color: #030303;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 100;
      cursor: pointer;
      transition: opacity 1s ease;
    }

    #overlay h2 {
      color: #ffccd5;
      font-size: 1.5rem;
      font-weight: 300;
      letter-spacing: 4px;
      margin-bottom: 20px;
      text-align: center;
      padding: 0 20px;
    }

    #btn-comenzar {
      background: transparent;
      border: 1px solid #8b1e3f;
      color: #ffccd5;
      padding: 12px 30px;
      font-size: 1rem;
      letter-spacing: 3px;
      border-radius: 30px;
      cursor: pointer;
      text-transform: uppercase;
      box-shadow: 0 0 15px rgba(139, 30, 63, 0.4);
      transition: all 0.3s ease;
    }

    #btn-comenzar:hover {
      background-color: #8b1e3f;
      box-shadow: 0 0 25px rgba(139, 30, 63, 0.8);
    }

    #carta-sorpresa {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 2;
      pointer-events: none;
      opacity: 0;
      transition: opacity 2s ease;
      background: radial-gradient(circle, rgba(139,30,63,0.2) 0%, rgba(3,3,3,0.9) 80%);
    }

    .polaroid-grande {
      background: #111;
      padding: 12px 12px 32px 12px;
      border-radius: 8px;
      border: 1px solid rgba(255, 204, 213, 0.4);
      box-shadow: 0 0 50px rgba(139, 30, 63, 0.7);
      width: 250px;
      max-width: 75vw;
      transform: scale(0.7);
      animation: zoomInFoto 2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      margin-bottom: 12px;
    }

    .polaroid-grande img {
      width: 100%;
      height: 270px;
      object-fit: cover;
      border-radius: 4px;
      display: block;
    }

    @keyframes zoomInFoto {
      to {
        transform: scale(1);
      }
    }

    #info-sorpresa {
      text-align: center;
      width: 90%;
      max-width: 450px;
      opacity: 0;
      animation: revealText 2s ease forwards 1s;
    }

    #nombre {
      color: #ffccd5;
      font-size: clamp(2rem, 5vw, 3rem);
      font-weight: 300;
      letter-spacing: 6px;
      text-transform: uppercase;
      text-shadow: 0 0 15px rgba(139, 30, 63, 0.9), 0 0 30px rgba(139, 30, 63, 0.6);
      margin-bottom: 6px;
    }

    .frase-amor {
      color: #e6a1b2;
      font-size: 0.95rem;
      letter-spacing: 2px;
      font-style: italic;
      line-height: 1.5;
      text-shadow: 0 0 10px rgba(0,0,0,0.8);
    }

    @keyframes revealText {
      to { opacity: 1; }
    }
  </style>
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

  <div id="overlay">
    <h2>Toca la pantalla para ver tu sorpresa</h2>
    <button id="btn-comenzar">Abrir</button>
  </div>

  <div id="carta-sorpresa">
    <div class="polaroid-grande">
      <img src="https://i.postimg.cc/Z5y3fZWk/IMG-20260417-WA0068.jpg" alt="Mariel">
    </div>
    <div id="info-sorpresa">
      <div id="nombre">Mariel</div>
      <div class="frase-amor">"Desde enero de 2021, cada segundo a tu lado se ha convertido en mi destino favorito..."</div>
    </div>
  </div>

  <!-- Audio nativo con la canción Blue de Yung Kai de fondo (sin el cuadro de Spotify) -->
  <audio id="background-audio" loop preload="auto">
    <source src="https://files.freemusicarchive.org/storage-freemusicarchive-org/tracks/audio_file/yung_kai_blue.mp3" type="audio/mpeg">
    <!-- Enlace alternativo directo a un archivo de audio limpio si prefieres cambiarlo -->
  </audio>

  <svg width="100" height="100" viewBox="0 0 100 100">
    <path id="rutaCorazon" d="M50,30 C35,10 10,25 10,50 C10,75 35,90 50,90 C65,90 90,75 90,50 C90,25 65,10 50,30 Z" />
  </svg>

  <script>
    const overlay = document.getElementById('overlay');
    const cartaSorpresa = document.getElementById('carta-sorpresa');
    const backgroundAudio = document.getElementById('background-audio');

    let animacionIniciada = false;

    overlay.addEventListener('click', () => {
      if (animacionIniciada) return;
      animacionIniciada = true;

      // Reproducir audio nativo de fondo
      backgroundAudio.play().catch(error => {
        console.log("Audio play blocked:", error);
      });

      overlay.style.opacity = 0;
      setTimeout(() => {
        overlay.style.display = 'none';
        cartaSorpresa.style.opacity = 1;
      }, 1000);

      iniciarAnimacionCorazon();
    });

    const scene = new THREE.Scene();
    const isMobile = window.innerWidth < 768;
    const cameraZ = isMobile ? 145 : 110;
    
    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.z = cameraZ;

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    document.body.appendChild(renderer.domElement);

    const path = document.querySelector("#rutaCorazon");
    const length = path.getTotalLength();
    const vertices = [];
    const tl = gsap.timeline({ paused: true });

    const step = isMobile ? 0.08 : 0.05;
    for (let i = 0; i < length; i += step) { 
      const point = path.getPointAtLength(i);
      
      const scaleSVG = 1.5;
      const targetX = (point.x - 50) * scaleSVG;
      const targetY = -((point.y - 50) * scaleSVG);
      const targetZ = 0;

      const vector = new THREE.Vector3(
        (Math.random() - 0.5) * 150,
        (Math.random() - 0.5) * 150,
        (Math.random() - 0.5) * 200
      );
      
      vertices.push(vector);

      tl.to(vector, {
        x: targetX + (Math.random() - 0.5) * 2,
        y: targetY + (Math.random() - 0.5) * 2,
        z: targetZ + (Math.random() - 0.5) * 8,
        duration: "random(2.5, 4.5)",
        ease: "power3.inOut"
      }, i * 0.0003);
    }

    const geometry = new THREE.BufferGeometry();
    const positions = new Float32Array(vertices.length * 3);
    geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));

    const material = new THREE.PointsMaterial({ 
      color: 0x8b1e3f, 
      size: isMobile ? 1.6 : 1.2, 
      transparent: true, 
      opacity: 0.9,
      blending: THREE.AdditiveBlending,
      depthWrite: false
    });
    
    const particles = new THREE.Points(geometry, material);
    scene.add(particles);

    function iniciarAnimacionCorazon() {
      tl.play();
    }

    let mouseX = 0;
    let mouseY = 0;
    let targetRotationX = 0;
    let targetRotationY = 0;

    window.addEventListener('mousemove', (event) => {
      mouseX = (event.clientX - window.innerWidth / 2) * 0.0008;
      mouseY = (event.clientY - window.innerHeight / 2) * 0.0008;
    });

    window.addEventListener('touchmove', (event) => {
      if (event.touches.length > 0) {
        mouseX = (event.touches[0].clientX - window.innerWidth / 2) * 0.001;
        mouseY = (event.touches[0].clientY - window.innerHeight / 2) * 0.001;
      }
    }, { passive: true });

    const clock = new THREE.Clock();

    function animate() {
      requestAnimationFrame(animate);

      const elapsedTime = clock.getElapsedTime();

      const positionAttribute = geometry.getAttribute('position');
      for (let i = 0; i < vertices.length; i++) {
        positionAttribute.setXYZ(i, vertices[i].x, vertices[i].y, vertices[i].z);
      }
      positionAttribute.needsUpdate = true;

      targetRotationY = mouseX + Math.sin(elapsedTime * 0.5) * 0.15;
      targetRotationX = mouseY + Math.cos(elapsedTime * 0.5) * 0.1;

      particles.rotation.y += (targetRotationY - particles.rotation.y) * 0.05;
      particles.rotation.x += (targetRotationX - particles.rotation.x) * 0.05;
      
      renderer.render(scene, camera);
    }

    animate();

    window.addEventListener('resize', () => {
      const mobileCheck = window.innerWidth < 768;
      camera.position.z = mobileCheck ? 145 : 110;
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
